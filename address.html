<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address</title>
</head>
<body><center>
    <section>
        <h2>Give Your Address</h2>
          <p> Name: <input type="text" placeholder="Enter your Name"></p><br>
           <p> Address: <input type="text" placeholder="Enter your Address"></p><br>
            <p> Phone Number: <input type="tel" placeholder="Enter your Phone Number"></p><br>
            <p> Email:  <input type="email" placeholder="Enter your Email"></p><br>
        
 </section>
    <section>
        <h2>Select Your Item</h2>
       <select>
            <option value="classic-burger"> Burger</option>
            <option value="grilled-chicken-sandwich">Grilled Chicken Sandwich</option>
            <option value="caesar-salad">Caesar Salad</option>
            <option value="bbq-ribs">BBQ Ribs</option>
            <option value="steak-frites">Steak Frites</option>
        </select>
    </section>
    <section>
        <h2>Payment Method</h2>
        <form align="centrer">
           <p> <input type="radio" name="payment" value="credit-card"> Credit Card</p> <br>  
           <p> <input type="radio" name="payment" value="paypal"> PayPal</p> <br>
            <p> <input type="radio" name="payment" value="Cash on delivery"> Cash on Delivery</p> <br>
        </form><br>
        <button type="submit">Submit Order</button> 
    </center>
</body>
</html>
