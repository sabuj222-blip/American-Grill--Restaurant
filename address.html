<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address</title>
</head>
<body>
    <section>
        <h2>Give Your Address</h2>
            <input type="text" placeholder="Enter your Name"><br>
            <input type="text" placeholder="Enter your Address"><br>
            <input type="tel" placeholder="Enter your Phone Number"><br>
            <input type="email" placeholder="Enter your Email"><br>
    </section>
    <section>
        <h2>Select Your Item</h2>
       <select>
            <option value="classic-burger"> Burger</option>
            <option value="grilled-chicken-sandwich">Grilled Chicken Sandwich</option>
            <option value="caesar-salad">Caesar Salad</option>
            <option value="bbq-ribs">BBQ Ribs</option>
            <option value="steak-frites">Steak Frites</option>
        </select>
    </section>
    <section>
        <h2>Payment Method</h2>
        <form>
            <input type="radio" name="payment" value="credit-card"> Credit Card<br>
            <input type="radio" name="payment" value="paypal"> PayPal<br>
            <input type="radio" name="payment" value="cash"> Cash on Delivery<br>
        </form><br>
        <button type="submit">Submit Order</button>
</body>
</html>
